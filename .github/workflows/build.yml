name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install binutils
        run: sudo apt-get install -y binutils

      - name: Build
        run: make

      - name: Verify
        run: make verify
